<svg width="680" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:system-ui,sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th { font-size:14px; font-weight:600; fill:#1a1a1a; }
    .ts { font-size:12px; font-weight:400; fill:#555; }
    .arr { stroke:#888; stroke-width:1.5; fill:none; }
    .c-gray  rect { fill:#F1EFE8; stroke:#888780; }
    .c-gray  text { fill:#2C2C2A; }
    .c-purple rect { fill:#EEEDFE; stroke:#534AB7; }
    .c-purple text { fill:#3C3489; }
    .c-teal  rect { fill:#E1F5EE; stroke:#0F6E56; }
    .c-teal  text { fill:#085041; }
    .c-coral rect { fill:#FAECE7; stroke:#993C1D; }
    .c-coral text { fill:#711B0D; }
    .c-amber rect { fill:#FAEEDA; stroke:#854F0B; }
    .c-amber text { fill:#633806; }
    .c-blue  rect { fill:#E6F1FB; stroke:#185FA5; }
    .c-blue  text { fill:#0C447C; }
    .c-green rect { fill:#EAF3DE; stroke:#3B6D11; }
    .c-green text { fill:#27500A; }
  </style>
</defs>

<!-- Title -->
<text class="th" x="340" y="30" text-anchor="middle" font-size="16">Q-ARAG Discord bot — architecture</text>

<!-- USER LAYER -->
<g class="c-gray">
  <rect x="40" y="55" width="120" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="100" y="77" text-anchor="middle" dominant-baseline="central">Discord user</text>
</g>
<g class="c-gray">
  <rect x="520" y="55" width="120" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="580" y="77" text-anchor="middle" dominant-baseline="central">Web user</text>
</g>

<!-- arrows users → interfaces -->
<line x1="100" y1="99" x2="100" y2="155" class="arr" marker-end="url(#arrow)" stroke="#888780"/>
<line x1="580" y1="99" x2="580" y2="155" class="arr" marker-end="url(#arrow)" stroke="#888780"/>

<!-- INTERFACE LAYER -->
<g class="c-purple">
  <rect x="40" y="155" width="120" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="100" y="175" text-anchor="middle" dominant-baseline="central">discord.py</text>
  <text class="ts" x="100" y="196" text-anchor="middle" dominant-baseline="central">-ask / -upload</text>
</g>
<g class="c-purple">
  <rect x="440" y="155" width="100" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="490" y="175" text-anchor="middle" dominant-baseline="central">React</text>
  <text class="ts" x="490" y="196" text-anchor="middle" dominant-baseline="central">Vite frontend</text>
</g>

<!-- arrows → FastAPI -->
<line x1="160" y1="183" x2="220" y2="183" class="arr" marker-end="url(#arrow)" stroke="#534AB7"/>
<line x1="440" y1="183" x2="380" y2="183" class="arr" marker-end="url(#arrow)" stroke="#534AB7"/>

<!-- API LAYER -->
<g class="c-teal">
  <rect x="220" y="155" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="300" y="175" text-anchor="middle" dominant-baseline="central">FastAPI</text>
  <text class="ts" x="300" y="196" text-anchor="middle" dominant-baseline="central">/query  /upload</text>
</g>

<!-- FastAPI → RAG -->
<line x1="300" y1="211" x2="300" y2="265" class="arr" marker-end="url(#arrow)" stroke="#1D9E75"/>

<!-- RAG CORE container -->
<rect x="40" y="265" width="600" height="160" rx="12" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="6 3"/>
<text class="ts" x="56" y="283" dominant-baseline="central">RAG core  (python/)</text>

<!-- ingest -->
<g class="c-coral">
  <rect x="60" y="295" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="140" y="315" text-anchor="middle" dominant-baseline="central">ingest.py</text>
  <text class="ts" x="140" y="336" text-anchor="middle" dominant-baseline="central">scrape · chunk · embed</text>
</g>
<!-- FAISS -->
<g class="c-amber">
  <rect x="265" y="295" width="150" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="315" text-anchor="middle" dominant-baseline="central">FAISS</text>
  <text class="ts" x="340" y="336" text-anchor="middle" dominant-baseline="central">per-guild vectors</text>
</g>
<!-- query -->
<g class="c-coral">
  <rect x="460" y="295" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="540" y="315" text-anchor="middle" dominant-baseline="central">query.py</text>
  <text class="ts" x="540" y="336" text-anchor="middle" dominant-baseline="central">retrieve · generate</text>
</g>

<!-- ingest → FAISS → query -->
<line x1="220" y1="323" x2="263" y2="323" class="arr" marker-end="url(#arrow)" stroke="#BA7517"/>
<line x1="415" y1="323" x2="458" y2="323" class="arr" marker-end="url(#arrow)" stroke="#BA7517"/>

<!-- embeddings label -->
<text class="ts" x="340" y="405" text-anchor="middle" dominant-baseline="central">Embeddings: MiniLM-L6-v2  (HuggingFace)</text>

<!-- query → LLMs -->
<line x1="540" y1="351" x2="540" y2="455" class="arr" marker-end="url(#arrow)" stroke="#993C1D"/>

<!-- LLMs -->
<g class="c-blue">
  <rect x="380" y="455" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="460" y="475" text-anchor="middle" dominant-baseline="central">Llama 3.3 70B</text>
  <text class="ts" x="460" y="496" text-anchor="middle" dominant-baseline="central">Groq API (primary)</text>
</g>
<g class="c-blue">
  <rect x="556" y="455" width="108" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="610" y="475" text-anchor="middle" dominant-baseline="central">Gemini</text>
  <text class="ts" x="610" y="496" text-anchor="middle" dominant-baseline="central">1.5 Flash</text>
</g>

<!-- fallback arrow -->
<line x1="540" y1="425" x2="610" y2="453" stroke-dasharray="4 3" class="arr" marker-end="url(#arrow)" stroke="#378ADD"/>
<text class="ts" x="570" y="443" text-anchor="middle">fallback</text>

<!-- SOURCES -->
<g class="c-green">
  <rect x="40" y="455" width="110" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="95" y="477" text-anchor="middle" dominant-baseline="central">PDFs</text>
</g>
<g class="c-green">
  <rect x="165" y="455" width="110" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="220" y="477" text-anchor="middle" dominant-baseline="central">URLs</text>
</g>

<!-- sources → ingest -->
<line x1="95"  y1="455" x2="110" y2="353" class="arr" marker-end="url(#arrow)" stroke="#3B6D11"/>
<line x1="220" y1="455" x2="175" y2="353" class="arr" marker-end="url(#arrow)" stroke="#3B6D11"/>

<!-- INFRA -->
<g class="c-gray">
  <rect x="40" y="555" width="120" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="100" y="577" text-anchor="middle" dominant-baseline="central">Docker</text>
</g>
<text class="ts" x="172" y="577" dominant-baseline="central">containerises backend + frontend</text>
</svg>
