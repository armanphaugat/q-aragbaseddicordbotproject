services:
  backend:
    build:
      context: .
      dockerfile: DockerFile.backend
    container_name: rag-backend
    ports:
      - "1005:8000"
    env_file:
      - .env
    volumes:
      - vectorstore_data:/app/vectorstore
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  bot:
    build:
      context: .
      dockerfile: DockerFile.bot
    container_name: rag-bot
    env_file:
      - .env
    volumes:
      - vectorstore_data:/app/vectorstore
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  vectorstore_data:
    driver: local