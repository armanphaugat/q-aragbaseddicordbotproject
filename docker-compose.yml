version: "3.9"
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - nexus-net
  backend:
    build:
      context: .
      dockerfile: DockerFile.backend
    container_name: nexus-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - vectorstore_data:/app/vectorstore
    restart: unless-stopped
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
  bot:
    build:
      context: ./bot
      dockerfile: DockerFile
    container_name: nexus-bot
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nexus-net
volumes:
  vectorstore_data:
    driver: local

networks:
  nexus-net:
    driver: bridge